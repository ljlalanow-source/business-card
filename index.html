<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lee Eun Jung</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --text: #1a1a2e;
    --text-dim: #5a5a72;
    --text-faint: #9a9ab0;
    --accent: #7c5cff;
    --accent-2: #ff6b9d;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }

  body {
    min-height: 100vh;
    color: var(--text);
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    -webkit-font-smoothing: antialiased;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    overflow: hidden;
    position: relative;
    background:
      linear-gradient(135deg, #fdfbff 0%, #f4f0ff 30%, #fff0f6 70%, #f0f9ff 100%);
  }

  .blob {
    position: fixed;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0.55;
    pointer-events: none;
    z-index: 0;
    animation: float 18s ease-in-out infinite;
  }

  .blob.b1 {
    width: 460px; height: 460px;
    background: radial-gradient(circle, #c8b6ff 0%, transparent 70%);
    top: -120px; left: -120px;
  }
  .blob.b2 {
    width: 520px; height: 520px;
    background: radial-gradient(circle, #ffb6d9 0%, transparent 70%);
    bottom: -160px; right: -140px;
    animation-delay: -6s;
  }
  .blob.b3 {
    width: 380px; height: 380px;
    background: radial-gradient(circle, #a5e8ff 0%, transparent 70%);
    top: 40%; left: 50%;
    transform: translate(-50%, -50%);
    animation-delay: -12s;
  }

  @keyframes float {
    0%, 100% { transform: translate(0, 0) scale(1); }
    33%      { transform: translate(40px, -30px) scale(1.08); }
    66%      { transform: translate(-30px, 40px) scale(0.95); }
  }
  .blob.b3 {
    animation-name: float-center;
  }
  @keyframes float-center {
    0%, 100% { transform: translate(-50%, -50%) scale(1); }
    50%      { transform: translate(-50%, -50%) scale(1.15); }
  }

  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background-image: radial-gradient(rgba(255,255,255,0.6) 1px, transparent 1px);
    background-size: 3px 3px;
    opacity: 0.4;
    pointer-events: none;
    z-index: 0;
    mix-blend-mode: overlay;
  }

  .card {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 440px;
    background: rgba(255, 255, 255, 0.45);
    border: 1px solid rgba(255, 255, 255, 0.7);
    border-radius: 28px;
    padding: 32px;
    backdrop-filter: blur(24px) saturate(180%);
    -webkit-backdrop-filter: blur(24px) saturate(180%);
    box-shadow:
      0 1px 0 0 rgba(255,255,255,0.9) inset,
      0 -1px 0 0 rgba(255,255,255,0.2) inset,
      0 24px 48px -12px rgba(124, 92, 255, 0.18),
      0 8px 24px -8px rgba(255, 107, 157, 0.15);
  }

  .top-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 28px;
  }

  .logo {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
    letter-spacing: -0.02em;
  }
  .logo span {
    background: linear-gradient(135deg, var(--accent), var(--accent-2));
    -webkit-background-clip: text;
            background-clip: text;
    color: transparent;
  }

  .badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--text-dim);
    padding: 5px 10px;
    border: 1px solid rgba(255, 255, 255, 0.8);
    border-radius: 999px;
    background: rgba(255, 255, 255, 0.5);
    letter-spacing: 0.02em;
    backdrop-filter: blur(8px);
  }

  .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: #22c55e;
    box-shadow: 0 0 8px rgba(34, 197, 94, 0.6);
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.5} }

  .profile {
    display: flex;
    align-items: center;
    gap: 18px;
    margin-bottom: 24px;
  }

  .avatar {
    width: 76px;
    height: 76px;
    border-radius: 20px;
    overflow: hidden;
    position: relative;
    flex-shrink: 0;
    border: 2px solid rgba(255, 255, 255, 0.9);
    box-shadow:
      0 8px 24px -6px rgba(124, 92, 255, 0.3),
      0 0 0 1px rgba(255,255,255,0.4) inset;
  }
  .avatar img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: 72% 28%;
  }

  .identity { min-width: 0; flex: 1; }

  .name {
    font-size: 24px;
    font-weight: 600;
    letter-spacing: -0.02em;
    color: var(--text);
    margin-bottom: 4px;
    line-height: 1.2;
  }

  .name-en {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--text-faint);
    letter-spacing: 0.05em;
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .role {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    font-weight: 500;
    padding: 4px 10px;
    border-radius: 999px;
    background: linear-gradient(135deg, rgba(124,92,255,0.12), rgba(255,107,157,0.12));
    border: 1px solid rgba(255,255,255,0.8);
    color: var(--accent);
  }
  .role::before {
    content: '';
    width: 4px; height: 4px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), var(--accent-2));
  }

  .tagline {
    font-size: 14px;
    line-height: 1.6;
    color: var(--text-dim);
    margin-bottom: 24px;
    padding: 16px;
    background: rgba(255, 255, 255, 0.4);
    border: 1px solid rgba(255, 255, 255, 0.7);
    border-radius: 16px;
    font-weight: 400;
    backdrop-filter: blur(12px);
  }

  .tagline-prompt {
    font-family: 'JetBrains Mono', monospace;
    background: linear-gradient(135deg, var(--accent), var(--accent-2));
    -webkit-background-clip: text;
            background-clip: text;
    color: transparent;
    margin-right: 8px;
    font-weight: 600;
  }

  .links {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-bottom: 24px;
  }

  .link {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 12px 14px;
    border: 1px solid rgba(255, 255, 255, 0.7);
    border-radius: 14px;
    background: rgba(255, 255, 255, 0.35);
    backdrop-filter: blur(12px);
    text-decoration: none;
    color: var(--text);
    transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    position: relative;
  }

  .link::after {
    content: '↗';
    position: absolute;
    right: 16px;
    color: var(--text-faint);
    font-size: 14px;
    transition: transform 0.25s ease, color 0.25s ease;
  }

  .link:hover {
    background: rgba(255, 255, 255, 0.7);
    border-color: rgba(255, 255, 255, 1);
    transform: translateY(-2px);
    box-shadow: 0 8px 20px -8px rgba(124, 92, 255, 0.25);
  }
  .link:hover::after {
    transform: translate(2px, -2px);
    color: var(--accent);
  }

  .link-icon {
    width: 36px;
    height: 36px;
    border-radius: 10px;
    background: linear-gradient(135deg, rgba(124,92,255,0.15), rgba(255,107,157,0.15));
    border: 1px solid rgba(255, 255, 255, 0.7);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    color: var(--accent);
  }
  .link-icon svg { width: 18px; height: 18px; }

  .link-content { flex: 1; min-width: 0; }

  .link-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--text-faint);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 2px;
  }

  .link-value {
    font-size: 13px;
    color: var(--text);
    font-weight: 500;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding-top: 20px;
    border-top: 1px solid rgba(255, 255, 255, 0.7);
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--text-faint);
    letter-spacing: 0.04em;
  }

  .footer-meta { display: flex; gap: 8px; }

  .kbd {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    padding: 2px 6px;
    border: 1px solid rgba(255,255,255,0.8);
    border-radius: 4px;
    background: rgba(255,255,255,0.5);
    color: var(--text-dim);
  }

  @media (max-width: 480px) {
    .card { padding: 24px; border-radius: 24px; }
    .name { font-size: 22px; }
    .avatar { width: 64px; height: 64px; border-radius: 16px; }
  }
</style>
</head>
<body>
  <div class="blob b1"></div>
  <div class="blob b2"></div>
  <div class="blob b3"></div>

  <div class="card">
    <div class="top-row">
      <div class="logo">lj<span>.</span>card</div>
      <div class="badge">
        <span class="dot"></span>
        <span>available</span>
      </div>
    </div>

    <div class="profile">
      <div class="avatar">
        <img src="8-1.jpeg" alt="Lee Eun Jung">
      </div>
      <div class="identity">
        <div class="name">이은정</div>
        <div class="name-en">Lee Eun Jung</div>
        <div class="role">하늘방랑자</div>
      </div>
    </div>

    <div class="tagline">
      <span class="tagline-prompt">~$</span>wandering through the sky, one horizon at a time.
    </div>

    <div class="links">
      <a class="link" href="mailto:asoiaf@naver.com">
        <div class="link-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="5" width="18" height="14" rx="2"/>
            <path d="m3 7 9 6 9-6"/>
          </svg>
        </div>
        <div class="link-content">
          <div class="link-label">email</div>
          <div class="link-value">asoiaf@naver.com</div>
        </div>
      </a>

      <a class="link" href="https://instagram.com/lj_lala" target="_blank" rel="noopener">
        <div class="link-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="18" height="18" rx="5"/>
            <circle cx="12" cy="12" r="4"/>
            <circle cx="17.5" cy="6.5" r="0.8" fill="currentColor"/>
          </svg>
        </div>
        <div class="link-content">
          <div class="link-label">instagram</div>
          <div class="link-value">@lj_lala</div>
        </div>
      </a>
    </div>

    <div class="footer">
      <span>v1.0 · 2026</span>
      <div class="footer-meta">
        <span class="kbd">⌘</span>
        <span class="kbd">K</span>
      </div>
    </div>
  </div>
</body>
</html>
